<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Last Man Standing</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png">
<meta name="theme-color" content="#2D1B69">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0f;
  --card: #15151f;
  --card-border: #1e1e2e;
  --text: #e8e8ed;
  --dim: #6b6b80;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.1);
  --yellow: #eab308;
  --yellow-bg: rgba(234,179,8,0.1);
  --accent: #6366f1;
  --accent-bg: rgba(99,102,241,0.1);
}

body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
  min-height: 100vh; -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none; -webkit-overflow-scrolling: touch;
}
html { overscroll-behavior-y: none; }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  padding: 14px 16px;
}
.header-inner {
  max-width: 600px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px; }
.header .title-text { display: inline-flex; flex-direction: column; }
.header .sub { font-size: 10px; color: var(--dim); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.header .time { font-size: 11px; color: var(--dim); text-align: right; }

.live-dot {
  display: inline-block; width: 6px; height: 6px;
  background: var(--green); border-radius: 50%; margin-right: 4px;
  animation: pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Tabs */
.tabs {
  display: flex; max-width: 600px; margin: 0 auto; padding: 8px 16px 0; gap: 4px;
}
.tab {
  flex: 1; padding: 10px 8px; text-align: center;
  font-size: 13px; font-weight: 600; color: var(--dim);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.2s;
}
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.tab .badge {
  display: inline-block; background: var(--accent); color: white;
  font-size: 10px; padding: 1px 5px; border-radius: 8px; margin-left: 4px; font-weight: 700;
}

.content { max-width: 600px; margin: 0 auto; padding: 12px 16px 80px; }
.view { display: none; }
.view.active { display: block; }

/* Player Cards */
.player-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
}
.player-card.eliminated { opacity: 0.4; }
.player-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}

.player-name { font-size: 14px; font-weight: 700; flex: 1; }
.alive-count {
  font-size: 13px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
}
.alive-count.c4,.alive-count.c3 { background: var(--green-bg); color: var(--green); }
.alive-count.c2,.alive-count.c1 { background: var(--yellow-bg); color: var(--yellow); }
.alive-count.c0 { background: var(--red-bg); color: var(--red); }
.team-list { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.team-chip {
  display: flex; align-items: center; padding: 6px 8px;
  border-radius: 8px; font-size: 12px; font-weight: 600; gap: 5px;
  min-height: 36px;
}
.team-chip.survived { background: rgba(34,197,94,0.06); color: rgba(34,197,94,0.7); }
.team-chip.alive, .team-chip.upcoming { background: rgba(107,107,128,0.08); color: var(--dim); }
.team-chip.eliminated { background: var(--red-bg); color: var(--red); opacity: 0.6; }
.team-chip.eliminated .chip-team { text-decoration: line-through; }
.team-chip.playing { transition: background 1s ease, color 0.5s ease; }
.chip-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.survived .chip-dot { display: none; }
.survived .chip-check { font-size: 10px; flex-shrink: 0; }
.alive .chip-dot, .upcoming .chip-dot { background: var(--dim); }
.eliminated .chip-dot { background: var(--red); }
.playing .chip-dot { background: var(--yellow); animation: pulse 2s infinite; }
.chip-main { flex: 1; min-width: 0; }
.chip-team { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 12px; }
.chip-seed { font-size: 9px; opacity: 0.6; font-weight: 500; }
.chip-vs { font-size: 9px; font-weight: 400; opacity: 0.6; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chip-spread {
  font-size: 13px; font-weight: 800; letter-spacing: -0.3px;
  flex-shrink: 0; text-align: right; min-width: 32px;
  transition: color 1s ease;
}
.chip-spread.fav { color: var(--red); }
.chip-spread.dog { color: var(--green); }
.upcoming .chip-spread { opacity: 0.6; }
.chip-info { font-size: 9px; font-weight: 400; opacity: 0.7; margin-top: 1px; }
.chip-abducted-from { font-size: 9px; font-weight: 600; opacity: 0.75; margin-top: 1px; color: var(--yellow); }
.team-chip.abducted {
  background: rgba(234,179,8,0.08) !important;
  color: var(--yellow) !important;
  border: 1px solid rgba(234,179,8,0.2);
}
.team-chip.abducted .chip-dot { background: var(--yellow); }
.chip-abd-tag {
  font-size: 8px; font-weight: 800; padding: 1px 4px; border-radius: 3px;
  background: rgba(234,179,8,0.2); color: var(--yellow);
  flex-shrink: 0; letter-spacing: 0.3px;
}

/* Game Cards */
.section-label {
  font-size: 13px; font-weight: 700; color: var(--dim);
  text-transform: uppercase; letter-spacing: 0.8px; margin: 16px 0 10px;
}
.section-label:first-child { margin-top: 4px; }

.game-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 12px; margin-bottom: 8px; overflow: hidden;
}
.game-card.live { border-color: var(--yellow); box-shadow: 0 0 20px rgba(234,179,8,0.08); }
.game-card.final .team-row.loser { opacity: 0.5; }
.game-card.final .team-row.winner .team-name { color: var(--green); }

.game-status {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.5px; padding: 8px 14px 0; color: var(--dim);
}
.game-status.live { color: var(--yellow); }

.team-row {
  display: flex; align-items: center; padding: 8px 14px; gap: 8px;
}
.team-row + .team-row { padding-top: 0; }

.team-seed {
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  background: var(--accent-bg); color: var(--accent);
  border-radius: 6px; font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.team-name { flex: 1; font-size: 14px; font-weight: 600; }
.owner-tag {
  font-size: 10px; font-weight: 600; color: var(--accent);
  background: var(--accent-bg); padding: 1px 6px; border-radius: 4px;
}
.team-spread {
  font-size: 12px; font-weight: 700; min-width: 36px; text-align: right;
}
.team-spread.fav { color: var(--red); }
.team-spread.dog { color: var(--green); }
.team-score {
  font-size: 18px; font-weight: 700; min-width: 36px; text-align: right;
}

.survival-tag, .cover-tag {
  font-size: 9px; font-weight: 800; padding: 2px 5px; border-radius: 4px;
  letter-spacing: 0.5px; text-transform: uppercase; flex-shrink: 0;
}
.survival-tag.safe { background: var(--green-bg); color: var(--green); }
.survival-tag.abduction { background: var(--yellow-bg); color: var(--yellow); }
.survival-tag.elim { background: var(--red-bg); color: var(--red); }
.cover-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.cover-dot.covering { background: var(--green); }
.cover-dot.not-covering { background: var(--red); }

.game-footer {
  padding: 4px 14px 8px; font-size: 11px; color: var(--dim);
}

/* Bracket */
.bracket-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; padding: 0 0 16px; }
.region-header {
  font-size: 13px; font-weight: 800; color: var(--text); text-transform: uppercase;
  letter-spacing: 1.2px; padding: 12px 8px 6px; border-bottom: 2px solid var(--accent);
  margin-bottom: 4px;
}
.region-bracket { display: flex; gap: 0; min-width: fit-content; align-items: stretch; margin-bottom: 20px; }
.bracket-round { display: flex; flex-direction: column; min-width: 155px; justify-content: space-around; }
.round-label {
  font-size: 9px; font-weight: 700; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.8px; text-align: center; padding: 4px 4px 4px; white-space: nowrap;
}
.bracket-game {
  display: flex; flex-direction: column; justify-content: center;
  flex: 1; padding: 2px 4px;
}
.bracket-slot {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 6px; overflow: hidden; margin: 2px 0;
}
.bracket-slot.live { border-color: var(--yellow); }
.bracket-team {
  display: flex; align-items: center; padding: 4px 6px; gap: 3px;
  font-size: 11px; font-weight: 600; min-height: 26px;
}
.bracket-team + .bracket-team { border-top: 1px solid var(--card-border); }
.bracket-team.winner { color: var(--green); }
.bracket-team.loser { opacity: 0.4; }
.bracket-team.abducted .bracket-owner { background: var(--yellow-bg); color: var(--yellow); }
.bracket-seed {
  width: 16px; height: 16px; display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: var(--accent); background: var(--accent-bg);
  border-radius: 4px; flex-shrink: 0;
}
.bracket-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bracket-owner {
  font-size: 8px; font-weight: 700; color: var(--accent); background: var(--accent-bg);
  padding: 1px 4px; border-radius: 3px; flex-shrink: 0; max-width: 50px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bracket-score { font-size: 12px; font-weight: 700; min-width: 20px; text-align: right; flex-shrink: 0; }
.bracket-tbd { color: var(--dim); font-style: italic; font-size: 10px; }
.bracket-connector { width: 10px; display: flex; flex-direction: column; }
.ff-section {
  margin-top: 8px; padding-top: 8px;
  border-top: 2px solid var(--accent);
}
.ff-header {
  font-size: 13px; font-weight: 800; color: var(--text); text-transform: uppercase;
  letter-spacing: 1.2px; padding: 0 8px 8px; text-align: center;
}
.ff-games { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.ff-game { width: 200px; }
.ff-label { font-size: 9px; color: var(--dim); text-align: center; padding-bottom: 2px; }

.empty { text-align: center; padding: 40px 20px; color: var(--dim); font-size: 14px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: var(--dim); }
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--card-border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 10px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Game Detail View */
#gameDetailView {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg); overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.2,0,0,1);
  will-change: transform;
}
#gameDetailView.open { transform: translateX(0); }

.detail-header {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--card-border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 10px;
}
.back-btn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  background: var(--card); border: 1px solid var(--card-border); border-radius: 50%;
  color: var(--text); cursor: pointer; font-size: 16px; flex-shrink: 0;
  transition: background 0.15s;
}
.back-btn:active { background: var(--card-border); }
.detail-header-title { font-size: 15px; font-weight: 700; flex: 1; }
.detail-header-status { font-size: 12px; color: var(--dim); }

.detail-body { max-width: 480px; margin: 0 auto; padding: 20px 16px 80px; }

.detail-status-bar {
  text-align: center; font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--dim); margin-bottom: 20px; padding: 8px 12px;
  background: var(--card); border-radius: 8px;
}
.detail-status-bar.live { color: var(--yellow); border: 1px solid rgba(234,179,8,0.25); }
.detail-status-bar.final { color: var(--text); }
.detail-status-bar .live-dot { margin-right: 6px; }

.scoreboard {
  display: flex; flex-direction: column; gap: 6px;
  margin-bottom: 20px;
}
.score-row {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 14px 16px;
  transition: border-color 0.3s;
}
.score-row.winner { border-color: var(--green); }
.score-row.loser { opacity: 0.5; }
.score-seed {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: var(--accent-bg); color: var(--accent);
  border-radius: 8px; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.score-info { flex: 1; min-width: 0; }
.score-team { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.score-owner {
  font-size: 11px; color: var(--accent); background: var(--accent-bg);
  display: inline-block; padding: 1px 6px; border-radius: 4px; margin-top: 3px;
}
.score-owner.abducted { background: rgba(234,179,8,0.15); color: var(--yellow); }
.score-number {
  font-size: 44px; font-weight: 800; letter-spacing: -2px;
  line-height: 1; flex-shrink: 0; min-width: 56px; text-align: right;
  color: var(--text);
}
.score-number.no-score { font-size: 22px; color: var(--dim); letter-spacing: 0; }
.score-row.winner .score-number { color: var(--green); }

.detail-section { margin-bottom: 16px; }
.detail-section-label {
  font-size: 11px; font-weight: 700; color: var(--dim); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 8px;
}
.spread-card {
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 12px; overflow: hidden;
}
.spread-row {
  display: flex; align-items: center; padding: 10px 14px; gap: 10px;
}
.spread-row + .spread-row { border-top: 1px solid var(--card-border); }
.spread-team-name { flex: 1; font-size: 13px; font-weight: 600; }
.spread-value {
  font-size: 14px; font-weight: 800; min-width: 42px; text-align: right;
}
.spread-value.fav { color: var(--red); }
.spread-value.dog { color: var(--green); }
.spread-value.empty { color: var(--dim); font-size: 12px; }

.cover-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600;
}
.cover-indicator .cover-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.cover-indicator.covering { color: var(--green); }
.cover-indicator.not-covering { color: var(--red); }
.cover-indicator .cover-dot.covering { background: var(--green); }
.cover-indicator .cover-dot.not-covering { background: var(--red); }

.survival-badge {
  font-size: 11px; font-weight: 800; padding: 3px 8px; border-radius: 6px;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.survival-badge.safe { background: var(--green-bg); color: var(--green); }
.survival-badge.abduction { background: var(--yellow-bg); color: var(--yellow); }
.survival-badge.elim { background: var(--red-bg); color: var(--red); }

.game-card { cursor: pointer; }
.game-card:active { opacity: 0.85; }
.team-chip[data-espn-id] { cursor: pointer; }
.team-chip[data-espn-id]:active { opacity: 0.8; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1><span>🏀</span><span class="title-text">Last Man Standing<div class="sub">March Madness 2026</div></span></h1>
    </div>
    <div class="time" id="clock">Loading...</div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="standings">The Boys</button>
  <button class="tab" data-tab="bracket">Bracket</button>
  <button class="tab" data-tab="games">Games <span class="badge" id="liveBadge" style="display:none">0</span></button>
</div>

<div class="content">
  <div id="standingsView" class="view active">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
  <div id="bracketView" class="view"></div>
  <div id="gamesView" class="view"></div>
</div>

<!-- Game Detail View (full-screen overlay, slides in from right) -->
<div id="gameDetailView">
  <div class="detail-header">
    <button class="back-btn" id="backBtn" aria-label="Back">&#8592;</button>
    <div class="detail-header-title" id="detailTitle">Game</div>
    <div class="detail-header-status" id="detailRefreshStatus"></div>
  </div>
  <div class="detail-body" id="detailBody">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
</div>

<script>
let currentTab = 'standings';
let gameDetailInterval = null;
let previousHash = 'standings';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  currentTab = name;
  history.replaceState(null, '', '#' + name);
  document.getElementById(currentTab + 'View').classList.add('active');
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

// Hash routing
function handleHash() {
  const h = location.hash.slice(1);
  if (h.startsWith('game/')) {
    const espnId = h.slice(5);
    openGameDetail(espnId, false); // false = don't push state (already navigated)
  } else {
    closeGameDetail(false);
    if (document.getElementById(h + 'View')) switchTab(h);
  }
}

window.addEventListener('popstate', handleHash);

// Restore tab from URL hash on load
if (location.hash) {
  const h = location.hash.slice(1);
  if (h.startsWith('game/')) {
    previousHash = 'standings';
    openGameDetail(h.slice(5), false);
  } else if (document.getElementById(h + 'View')) {
    switchTab(h);
  }
}



function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderStandings(standings) {
  const el = document.getElementById('standingsView');
  if (!standings?.length) { el.innerHTML = '<div class="empty">No data</div>'; return; }

  const alive = standings.filter(p => p.alive > 0).sort((a, b) => a.name.localeCompare(b.name));
  const gone = standings.filter(p => p.alive === 0).sort((a, b) => a.name.localeCompare(b.name));

  let html = '';

  if (alive.length) {
    html += `<div class="section-label">Still In — ${alive.length}/${standings.length}</div>`;
    html += alive.map(p => playerCard(p)).join('');
  }

  if (gone.length) {
    html += `<div class="section-label" style="margin-top:20px">Gone</div>`;
    html += gone.map(p => playerCard(p)).join('');
  }

  el.innerHTML = html;
}

function playerCard(p) {
  const dead = p.alive === 0;
  const sortedTeams = [...p.teams].sort((a, b) => {
    const o = { playing: 0, alive: 1, upcoming: 2, eliminated: 3 };
    return (o[a.status] ?? 2) - (o[b.status] ?? 2);
  });
  return `<div class="player-card${dead ? ' eliminated' : ''}">
    <div class="player-header">
      <div class="player-name">${esc(p.name)}</div>
      <div class="alive-count c${p.alive}">${p.alive}/4</div>
    </div>
    <div class="team-list">
      ${sortedTeams.map(t => {
        let chipStyle = '';
        let chipStatus = t.status;
        // survived = won their game (green check). alive/upcoming = hasn't played yet (gray).
        if (t.status === 'alive' && t.gameInfo && (t.gameInfo.includes('Won') || t.gameInfo.includes('Abduction'))) chipStatus = 'survived';
        else if (t.status === 'alive') chipStatus = 'upcoming';
        // Dynamic background for live games based on cover margin
        if (t.status === 'playing' && t.margin != null) {
          const m = Math.max(-15, Math.min(15, t.margin));
          const pct = (m + 15) / 30;
          const r = Math.round(239 - pct * 200);
          const g = Math.round(68 + pct * 129);
          const b = Math.round(68 - pct * 20);
          const alpha = 0.08 + Math.abs(m) / 15 * 0.12;
          chipStyle = `style="background:rgba(${r},${g},${b},${alpha}); color:rgb(${r},${g},${b})"`;
        } else if (t.status === 'playing') {
          chipStyle = `style="background:var(--yellow-bg); color:var(--yellow)"`;
        }
        const spread = t.spread || '';
        // Dynamic spread color: for live games, shift from red→green based on cover distance
        let spreadStyle = '';
        if (t.status === 'playing' && t.margin != null && spread) {
          const m = Math.max(-15, Math.min(15, t.margin));
          const pct = (m + 15) / 30; // 0=deep red, 0.5=neutral, 1=deep green
          const sr = Math.round(239 - pct * 200);
          const sg = Math.round(68 + pct * 129);
          const sb = Math.round(68 - pct * 20);
          spreadStyle = `style="color:rgb(${sr},${sg},${sb})"`;
        }
        const spreadClass = (!spreadStyle && spread) ? (spread.startsWith('-') ? 'fav' : spread.startsWith('+') ? 'dog' : '') : '';
        const vsLine = t.opponent ? `vs ${esc(t.opponent)}` : '';
        const isAbducted = !!(t.abductedFrom);
        const extraChipClass = isAbducted ? ' abducted' : '';
        // Add click handler for any team with an ESPN game ID
        const isClickable = !!t.espnId;
        const clickAttr = isClickable ? ` data-espn-id="${esc(t.espnId)}" onclick="openGameDetail('${esc(t.espnId)}')"` : '';
        return `<div class="team-chip ${chipStatus}${extraChipClass}" ${chipStyle}${clickAttr}>
          ${chipStatus === 'survived' ? '<span class="chip-check">&#10003;</span>' : `<div class="chip-dot"${t.status === 'playing' && t.margin != null ? ' style="background:currentColor"' : ''}></div>`}
          <div class="chip-main">
            <span class="chip-team">${esc(t.name)}</span>
            ${isAbducted ? `<div class="chip-abducted-from">was ${esc(t.abductedFrom)}</div>` : ''}
            ${!isAbducted && vsLine ? `<div class="chip-vs">${vsLine}</div>` : ''}
            ${t.status === 'playing' && t.gameInfo ? `<div class="chip-info">${esc(t.gameInfo)}</div>` : ''}
          </div>
          ${isAbducted ? '<span class="chip-abd-tag">ABD</span>' : ''}
          ${spread ? `<div class="chip-spread ${spreadClass}" ${spreadStyle}>${esc(spread)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderGames(data) {
  const el = document.getElementById('gamesView');
  const { live, upcoming, completed } = data;
  let html = '';

  if (live?.length) {
    html += '<div class="section-label"><span class="live-dot"></span> Live</div>';
    html += live.map(g => gameCard(g, 'live')).join('');
  }
  if (upcoming?.length) {
    // Group by section (Thursday / Friday)
    const thu = upcoming.filter(g => g.section === 'Thursday');
    const fri = upcoming.filter(g => g.section === 'Friday');
    if (thu.length) {
      html += '<div class="section-label">Thursday</div>';
      html += thu.map(g => gameCard(g, 'upcoming')).join('');
    }
    if (fri.length) {
      html += '<div class="section-label">Friday</div>';
      html += fri.map(g => gameCard(g, 'upcoming')).join('');
    }
  }
  if (completed?.length) {
    html += '<div class="section-label">Completed</div>';
    html += completed.map(g => gameCard(g, 'final')).join('');
  }

  el.innerHTML = html || '<div class="empty">No games yet</div>';

  const badge = document.getElementById('liveBadge');
  if (live?.length) { badge.style.display = 'inline-block'; badge.textContent = live.length; }
  else badge.style.display = 'none';
}

function gameCard(g, type) {
  const isLive = type === 'live';
  const isFinal = type === 'final';
  const hasScores = g.team1.score != null && g.team2.score != null && (isLive || isFinal);
  const clickable = !!g.espnId;

  let statusText = '';
  if (isLive) statusText = g.statusDetail || 'In Progress';
  else if (isFinal) statusText = 'Final';
  else if (g.statusDetail) {
    // Extract just the time portion (e.g., "3/19 - 6:50 PM EDT" → "6:50 PM ET")
    const m = g.statusDetail.match(/(\d{1,2}:\d{2}\s*[AP]M)\s*(E[DS]T)?/i);
    statusText = m ? m[1] + ' ET' : g.statusDetail;
  }

  const clickAttr = clickable ? ` onclick="openGameDetail('${esc(g.espnId)}')" style="cursor:pointer"` : '';

  return `<div class="game-card ${type}"${clickAttr}>
    ${statusText ? `<div class="game-status ${type}">${isLive ? '<span class="live-dot"></span>' : ''}${esc(statusText)}</div>` : ''}
    ${teamRow(g.team1, hasScores, isFinal, isLive)}
    ${teamRow(g.team2, hasScores, isFinal, isLive)}
  </div>`;
}

function teamRow(t, hasScores, isFinal, isLive) {
  const spread = t.spread || '';
  const spreadClass = spread.startsWith('-') ? 'fav' : spread.startsWith('+') ? 'dog' : '';
  let winClass = '';
  let survivalTag = '';
  
  if (isFinal) {
    if (t.survived === false) {
      winClass = ' loser';
      survivalTag = '<span class="survival-tag elim">OUT</span>';
    } else if (t.survived === true && t.won) {
      winClass = ' winner';
      survivalTag = '<span class="survival-tag safe">W</span>';
    } else if (t.survived === true && !t.won) {
      winClass = ' winner';
      survivalTag = '<span class="survival-tag abduction">ABD</span>';
    } else if (t.won === true) {
      winClass = ' winner';
    } else if (t.won === false) {
      winClass = ' loser';
    }
  }
  
  // Live covering indicator
  let coverTag = '';
  if (isLive && t.covering === true) {
    coverTag = '<span class="cover-dot covering"></span>';
  } else if (isLive && t.covering === false) {
    coverTag = '<span class="cover-dot not-covering"></span>';
  }

  return `<div class="team-row${winClass}">
    ${t.seed ? `<div class="team-seed">${esc(t.seed)}</div>` : '<div style="width:24px"></div>'}
    <div class="team-name">${esc(t.team)}</div>
    ${t.owner ? `<span class="owner-tag">${esc(t.owner)}</span>` : ''}
    ${coverTag}${survivalTag}
    ${spread ? `<div class="team-spread ${spreadClass}">${esc(spread)}</div>` : ''}
    ${hasScores ? `<div class="team-score">${t.score}</div>` : ''}
  </div>`;
}

function renderBracket(data) {
  const el = document.getElementById('bracketView');
  if (!data || !data.regions) { el.innerHTML = '<div class="empty">No bracket data</div>'; return; }

  let html = '<div class="bracket-wrap">';

  // Render each region
  for (const regionName of ['East', 'West', 'South', 'Midwest']) {
    const rounds = data.regions[regionName];
    if (!rounds || rounds.length === 0) continue;

    html += `<div class="region-header">${esc(regionName)} Region</div>`;
    html += '<div class="region-bracket">';

    rounds.forEach((round, ri) => {
      html += '<div class="bracket-round">';
      html += `<div class="round-label">${esc(round.name)}</div>`;

      round.games.forEach(g => {
        const hasScores = g.isFinal || g.isLive;
        html += `<div class="bracket-game"><div class="bracket-slot${g.isLive ? ' live' : ''}">`;
        html += bracketTeamRow(g.team1, g, hasScores);
        html += bracketTeamRow(g.team2, g, hasScores);
        html += '</div></div>';
      });

      html += '</div>';
      if (ri < rounds.length - 1) html += '<div class="bracket-connector"></div>';
    });

    html += '</div>';
  }

  // Final Four + Championship
  if (data.finalFour) {
    html += '<div class="ff-section">';
    html += '<div class="ff-header">Final Four</div>';
    html += '<div class="ff-games">';
    data.finalFour.forEach(g => {
      const hasScores = g.isFinal || g.isLive;
      html += `<div class="ff-game">`;
      if (g.label) html += `<div class="ff-label">${esc(g.label)}</div>`;
      html += `<div class="bracket-slot${g.isLive ? ' live' : ''}">`;
      html += bracketTeamRow(g.team1, g, hasScores);
      html += bracketTeamRow(g.team2, g, hasScores);
      html += '</div></div>';
    });
    html += '</div>';

    if (data.championship) {
      html += '<div class="ff-header" style="padding-top:12px">Championship</div>';
      html += '<div class="ff-games">';
      const g = data.championship;
      const hasScores = g.isFinal || g.isLive;
      html += `<div class="ff-game"><div class="bracket-slot${g.isLive ? ' live' : ''}">`;
      html += bracketTeamRow(g.team1, g, hasScores);
      html += bracketTeamRow(g.team2, g, hasScores);
      html += '</div></div></div>';
    }
    html += '</div>';
  }

  html += '</div>';
  el.innerHTML = html;
}

function bracketTeamRow(t, game, hasScores) {
  if (!t.name || t.name === 'TBD') {
    return '<div class="bracket-team bracket-tbd">TBD</div>';
  }

  let cls = 'bracket-team';
  if (game.isFinal && t.won === true) cls += ' winner';
  if (game.isFinal && t.won === false) cls += ' loser';
  if (t.abducted) cls += ' abducted';

  const ownerName = t.owner || '';
  const firstName = ownerName.split(' ')[0]; // Show first name only to save space

  return `<div class="${cls}">
    ${t.seed ? `<div class="bracket-seed">${esc(t.seed)}</div>` : ''}
    <div class="bracket-name">${esc(t.name)}</div>
    ${firstName ? `<span class="bracket-owner">${esc(firstName)}</span>` : ''}
    ${hasScores && t.score != null ? `<div class="bracket-score">${t.score}</div>` : ''}
  </div>`;
}

// --- Game Detail ---
function openGameDetail(espnId, pushState = true) {
  if (pushState) {
    previousHash = location.hash.slice(1) || currentTab;
    history.pushState(null, '', '#game/' + espnId);
  }
  const view = document.getElementById('gameDetailView');
  view.classList.add('open');
  document.body.style.overflow = 'hidden';
  loadGameDetail(espnId);
  // Live refresh
  if (gameDetailInterval) clearInterval(gameDetailInterval);
  gameDetailInterval = setInterval(() => {
    if (view.classList.contains('open')) loadGameDetail(espnId);
  }, 15000);
}

function closeGameDetail(popState = true) {
  const view = document.getElementById('gameDetailView');
  view.classList.remove('open');
  document.body.style.overflow = '';
  if (gameDetailInterval) { clearInterval(gameDetailInterval); gameDetailInterval = null; }
  if (popState) {
    const target = previousHash || currentTab;
    history.pushState(null, '', '#' + target);
    if (document.getElementById(target + 'View')) switchTab(target);
  }
}

document.getElementById('backBtn').addEventListener('click', () => closeGameDetail(true));

async function loadGameDetail(espnId) {
  const body = document.getElementById('detailBody');
  const statusEl = document.getElementById('detailRefreshStatus');
  try {
    const res = await fetch('/api/game/' + espnId);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const g = await res.json();
    renderGameDetail(g);
    statusEl.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    if (!body.querySelector('.scoreboard')) {
      body.innerHTML = `<div class="empty">Failed to load game<br><span style="font-size:12px;opacity:0.6;margin-top:6px;display:block">Tap to retry</span></div>`;
      body.querySelector('.empty').style.cursor = 'pointer';
      body.querySelector('.empty').onclick = () => loadGameDetail(espnId);
    }
    statusEl.textContent = 'Error';
  }
}

function renderGameDetail(g) {
  const body = document.getElementById('detailBody');
  const title = document.getElementById('detailTitle');

  // Header title
  title.textContent = g.team1.name + ' vs ' + g.team2.name;

  const t1 = g.team1, t2 = g.team2;
  const hasScores = (g.isLive || g.isFinal) && t1.score != null && t2.score != null;

  // Status bar
  let statusText = '', statusClass = '';
  if (g.isLive) {
    statusText = (g.statusDetail || 'In Progress');
    statusClass = 'live';
  } else if (g.isFinal) {
    statusText = 'Final';
    statusClass = 'final';
  } else {
    // Extract time
    const m = g.statusDetail && g.statusDetail.match(/(\d{1,2}:\d{2}\s*[AP]M)\s*(E[DS]T)?/i);
    statusText = m ? m[1] + ' ET' : (g.statusDetail || (g.section || 'Upcoming'));
    statusClass = '';
  }

  // Determine winner/loser for rows
  const t1won = g.isFinal && t1.won === true;
  const t2won = g.isFinal && t2.won === true;

  function scoreRowClass(tWon, tLost) {
    if (g.isFinal) return tWon ? ' winner' : ' loser';
    return '';
  }

  function scoreNum(t) {
    if (!hasScores) return `<div class="score-number no-score">—</div>`;
    return `<div class="score-number">${t.score}</div>`;
  }

  function ownerTag(t) {
    if (!t.owner) return '';
    return `<div class="score-owner">${esc(t.owner)}</div>`;
  }

  // Spread display
  function spreadValue(spread) {
    if (!spread) return `<span class="spread-value empty">—</span>`;
    const cls = spread.startsWith('-') ? 'fav' : spread.startsWith('+') ? 'dog' : '';
    return `<span class="spread-value ${cls}">${esc(spread)}</span>`;
  }

  // Cover/survival status per team
  function coverOrSurvival(t, isT1) {
    if (g.isFinal) {
      if (t.survived === true && t.won) {
        return `<span class="survival-badge safe">W</span>`;
      } else if (t.survived === true && !t.won) {
        return `<span class="survival-badge abduction">ABD</span>`;
      } else if (t.survived === false) {
        return `<span class="survival-badge elim">OUT</span>`;
      }
      return '';
    }
    if (g.isLive && t.covering === true) {
      return `<span class="cover-indicator covering"><span class="cover-dot covering"></span>Covering</span>`;
    }
    if (g.isLive && t.covering === false) {
      return `<span class="cover-indicator not-covering"><span class="cover-dot not-covering"></span>Not Covering</span>`;
    }
    return '';
  }

  body.innerHTML = `
    <div class="detail-status-bar ${statusClass}">
      ${g.isLive ? '<span class="live-dot"></span>' : ''}${esc(statusText)}
    </div>

    <div class="scoreboard">
      <div class="score-row${scoreRowClass(t1won, !t1won)}">
        ${t1.seed ? `<div class="score-seed">${esc(String(t1.seed))}</div>` : ''}
        <div class="score-info">
          <div class="score-team">${esc(t1.name)}</div>
          ${ownerTag(t1)}
        </div>
        ${scoreNum(t1)}
      </div>
      <div class="score-row${scoreRowClass(t2won, !t2won)}">
        ${t2.seed ? `<div class="score-seed">${esc(String(t2.seed))}</div>` : ''}
        <div class="score-info">
          <div class="score-team">${esc(t2.name)}</div>
          ${ownerTag(t2)}
        </div>
        ${scoreNum(t2)}
      </div>
    </div>

    <div class="detail-section">
      <div class="detail-section-label">Spread</div>
      <div class="spread-card">
        <div class="spread-row">
          <span class="spread-team-name">${esc(t1.name)}</span>
          ${spreadValue(t1.spread)}
          ${coverOrSurvival(t1, true)}
        </div>
        <div class="spread-row">
          <span class="spread-team-name">${esc(t2.name)}</span>
          ${spreadValue(t2.spread)}
          ${coverOrSurvival(t2, false)}
        </div>
      </div>
    </div>
  `;
}

async function load() {
  try {
    const res = await fetch('/api/data');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    // Cache successful response in localStorage for offline fallback
    try { localStorage.setItem('lms_cache', JSON.stringify({ ts: Date.now(), data: d })); } catch(e) {}
    renderStandings(d.standings);
    renderBracket(d.bracket);
    renderGames(d.games);
    document.getElementById('clock').innerHTML =
      `<span class="live-dot"></span> ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
  } catch (e) {
    console.error(e);
    document.getElementById('clock').textContent = 'Error';
    // Try cached data first
    try {
      const cached = JSON.parse(localStorage.getItem('lms_cache') || 'null');
      if (cached && cached.data) {
        renderStandings(cached.data.standings);
        renderBracket(cached.data.bracket);
        renderGames(cached.data.games);
        const ago = Math.round((Date.now() - cached.ts) / 60000);
        document.getElementById('clock').textContent = `Offline · ${ago}m ago`;
        return;
      }
    } catch(_) {}
    // No cache — show retry message
    const el = document.getElementById('standingsView');
    el.innerHTML = `<div class="empty" style="cursor:pointer" onclick="load()">
      ⚠️ Failed to load<br><span style="font-size:12px;opacity:0.6;margin-top:6px;display:block">Tap to retry</span>
    </div>`;
  }
}

load();
setInterval(load, 15000);

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

// Pull to refresh — iOS-native feel
(() => {
  const ptr = document.createElement('div');
  ptr.innerHTML = '<div class="ptr-spinner"></div>';
  ptr.className = 'ptr';
  document.body.prepend(ptr);

  const style = document.createElement('style');
  style.textContent = `
    .ptr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      height: 0; overflow: hidden; transition: none;
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      will-change: height;
      contain: layout style;
    }
    .ptr.releasing { transition: height 0.3s cubic-bezier(0.2,0,0,1), opacity 0.3s ease; }
    .ptr.refreshing { transition: height 0.2s cubic-bezier(0.2,0,0,1); }
    .ptr-spinner {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--card-border);
      border-top-color: var(--accent);
      opacity: 0;
      will-change: transform, opacity;
      transform: translateZ(0) scale(0.5) rotate(0deg);
      transition: opacity 0.2s, transform 0.3s cubic-bezier(0.2,0,0,1);
    }
    .ptr.pulling .ptr-spinner { opacity: 1; transform: translateZ(0) scale(1) rotate(var(--rot)); }
    .ptr.ready .ptr-spinner { opacity: 1; transform: translateZ(0) scale(1.1) rotate(var(--rot)); border-top-color: var(--green); }
    .ptr.refreshing .ptr-spinner {
      opacity: 1; transform: translateZ(0) scale(1);
      animation: ptr-spin 0.6s linear infinite;
    }
    @keyframes ptr-spin { to { transform: translateZ(0) rotate(360deg); } }
  `;
  document.head.appendChild(style);

  let startY = 0, startX = 0, active = false, refreshing = false, locked = false;
  const threshold = 70, maxPull = 100;

  document.addEventListener('touchstart', e => {
    if (refreshing) return;
    // Only activate at top of page — check both scroll positions
    const scrollTop = window.scrollY || document.documentElement.scrollTop || 0;
    if (scrollTop > 5) return;
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    active = true;
    locked = false;
    ptr.classList.remove('releasing', 'refreshing', 'ready', 'pulling');
    ptr.style.transition = 'none';
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (!active || refreshing) return;
    const dy = e.touches[0].clientY - startY;
    const dx = e.touches[0].clientX - startX;

    // Lock direction on first significant move — if horizontal, bail (bracket scrolling)
    if (!locked) {
      if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
        locked = true;
        if (Math.abs(dx) > Math.abs(dy)) { active = false; return; }
      } else { return; }
    }

    if (dy <= 0) return;

    // Use requestAnimationFrame for smooth updates
    const pull = Math.min(dy * 0.45, maxPull);
    const pct = Math.min(pull / threshold, 1);
    requestAnimationFrame(() => {
      if (!active) return;
      ptr.style.height = pull + 'px';
      ptr.style.setProperty('--rot', (pct * 270) + 'deg');
      ptr.classList.add('pulling');
      if (pct >= 1) ptr.classList.add('ready');
      else ptr.classList.remove('ready');
    });
  }, { passive: true });

  function release() {
    if (!active || refreshing) return;
    active = false;
    const h = parseFloat(ptr.style.height) || 0;
    if (h >= threshold) {
      refreshing = true;
      ptr.classList.remove('pulling', 'ready');
      ptr.classList.add('refreshing');
      ptr.style.height = '44px';
      load().then(() => {
        setTimeout(dismiss, 200); // brief pause so spinner doesn't vanish instantly
      }).catch(() => {
        dismiss();
      });
    } else {
      dismiss();
    }
  }

  function dismiss() {
    ptr.classList.remove('pulling', 'ready', 'refreshing');
    ptr.classList.add('releasing');
    ptr.style.height = '0';
    setTimeout(() => { refreshing = false; ptr.classList.remove('releasing'); }, 320);
  }

  document.addEventListener('touchend', release, { passive: true });
  document.addEventListener('touchcancel', release, { passive: true });
})();
